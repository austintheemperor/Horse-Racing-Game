<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="field"></div>
<p id="money"></p>
<!--        use the alt tag to select which color you want to use       -->
<img class="horse" id="horse01" alt="red" src="images/redHorse.png">
<img class="horse" id="horse02" alt="blue" src="images/blueHorse.png">
<img class="horse" id="horse03" alt="green" src="images/greenHorse.png">
<img class="horse" id="horse04" alt="pink" src="images/pinkHorse.png">
<img class="horse" id="horse05" alt="purple" src="images/purpleHorse.png">
<h1 id="winnerText" style="display: none;"></h1>
<button id="restartRace" style="display: none;" onclick="openMenu()">Next Race</button>
<div id="menuOverlay" class="hidden">
    <div class="menuBox">
        <label for="horseGamba">Choose a horse:</label>
        <select id="horseGamba" name="horses">
            <option value="red">Red Horse</option>
            <option value="blue">Blue Horse</option>
            <option value="green">Green Horse</option>
            <option value="pink">Pink Horse</option>
            <option value="purple">Purple Horse</option>
        </select><br>
        <label for="betAmount">Bet Amount:</label>
        <input type="number" id="betAmount" name="betAmount">
        <button onclick="startGame()">Start</button>
    </div>
</div>

<script src="javaScript/horseRun.js"></script>
<script src="javaScript/javaScript_v1.js"></script>


</body>
</html>
