<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Horse</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="field"></div>
<!--        use the alt tag to select which color you want to use       -->
         <img class="horse" id="horse01" alt="red" src="images/redHorse.png">
         <img class="horse" id="horse02" alt="blue" src="images/blueHorse.png">
         <img class="horse" id="horse03" alt="green" src="images/greenHorse.png">
         <img class="horse" id="horse04" alt="pink" src="images/pinkHorse.png" >
         <img class="horse" id="horse05" alt="purple" src="images/purpleHorse.png">
<h1 id="winnerText"></h1>


        <script src="javaScript/horseRun.js"></script>
        <script src="javaScript/javaScript_v1.js"></script>
         <p id="output">$</p>
        <div id="popup">Make Your Bets!
            <br>
    <label for="amount">Enter your bet amount:</label>
            <br>
<input type="number" id="amount" name="amount" min="0" step="0.01" placeholder="0.00">
            <br>
            <label for="horseColor">Choose a horse:</label>
            <br>
            <select id="horseColor" name="horseColor">
                <option value="">Select a horse</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="purple">Purple</option>
                 <option value="Pink">Pink</option>

                <button id="startButton">Start</button>
            </select>
        </div>
    </body>
</html>
